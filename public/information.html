<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>크리스탈TV - 정보</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="information">
    <header class="top-nav">
      <div class="nav-left">
        <a href="/" class="logo" aria-label="크리스탈TV 홈"><img src="./assets/logo.png" alt="크리스탈TV" class="logo-img" /></a>
        <nav>
          <a href="/" class="nav-link">홈</a>
          <a href="/drama" class="nav-link">드라마</a>
          <a href="/movie" class="nav-link">영화</a>
          <a href="/latest" class="nav-link">최신공개</a>
          <a href="/category" class="nav-link">카테고리</a>
        </nav>
      </div>
      <div class="nav-right">
        <button class="icon-btn" aria-label="시청 기록"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7v5l3 2M21 12a9 9 0 1 1-2.64-6.36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
        <button class="icon-btn" aria-label="검색"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 19a8 8 0 1 1 5.29-2l4.35 4.35" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
        <button class="icon-btn" aria-label="사용자 프로필"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 1 0-16 0M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
      </div>
    </header>

    <main class="page">
      <section class="content-section">
        <div class="info-layout">
          <aside class="category-sidebar">
            <img id="info-poster" class="info-poster" alt="포스터" />
            <h2 id="info-title" class="info-sidebar-title">콘텐츠 정보</h2>
            <a id="info-watch-link" class="more-link" href="#">시청하기 &#8250;</a>
            <div id="info-meta" class="info-meta"></div>
          </aside>
          <div class="category-panel">
            <div class="section-head info-head-row">
              <button id="info-back-btn" class="info-back-btn" type="button" aria-label="이전으로">
                &#8249; 이전
              </button>
            </div>
            <section class="category-block">
              <div class="section-head"><h2>회차</h2></div>
              <div id="info-episodes" class="info-episode-list"></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
